version: "3.8"

services:
    
  sdv_runtime:
    image: ghcr.io/eclipse-autowrx/sdv-runtime:latest
    container_name: sdv_runtime
    network_mode: host
    environment:
      RUNTIME_NAME: CarMate
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2.0
<<<<<<< Updated upstream
