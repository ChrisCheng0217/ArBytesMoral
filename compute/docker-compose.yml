=======
    container_name: mqtt_COMPOSE
>>>>>>> Stashed changes
    depends_on:
      - sdv_runtime
    volumes:
      - ./mosquitto/config:/mosquitto/config
    restart: unless-stopped

  zenoh:
    image: eclipse/zenoh
    container_name: zenoh
    network_mode: host
    depends_on:
      - mqtt
    restart: unless-stopped

  mqtt_provider:
    build:
      context: ./MQTT_KUIKSA_Provider
    container_name: mqtt_provider
    network_mode: host
    depends_on:
      - mqtt
    restart: unless-stopped

  carla_provider:
    image: ghcr.io/raihhann/carla_mqtt_provider:latest
    container_name: carla_provider
    network_mode: host
    depends_on:
      - mqtt
    command: python /home/carla_provider.py
    restart: unless-stopped
    
  vehicle_data_accessor:
    build:
      context: ./Vehicle_data_accessor
    container_name: vehicle_data_accessor
    network_mode: host
    depends_on:
      - mqtt
    restart: unless-stopped
    
  carmate_agents:
    build:
      context: ./carmate_agents
    container_name: carmate_agents
    network_mode: host
    depends_on:
      - mqtt
    restart: unless-stopped
    
  carmate_io:
    build:
      context: ./car_mate_io
    container_name: carmate_io
    network_mode: host
    depends_on:
      - zenoh
    restart: unless-stopped


